<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <rect width="500" height="180" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">grid-column: 1 / 3  y  1 / -1</text>
  <rect x="30" y="35" width="440" height="120" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <line x1="176" y1="35" x2="176" y2="155" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <line x1="322" y1="35" x2="322" y2="155" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <!-- Líneas numeradas -->
  <text x="40" y="170" font-family="monospace" font-size="8" fill="#00BCD4">1</text>
  <text x="180" y="170" font-family="monospace" font-size="8" fill="#00BCD4">2</text>
  <text x="326" y="170" font-family="monospace" font-size="8" fill="#00BCD4">3</text>
  <text x="460" y="170" font-family="monospace" font-size="8" fill="#00BCD4">4</text>
  <line x1="40" y1="168" x2="40" y2="172" stroke="#00BCD4" stroke-width="1"/>
  <line x1="176" y1="168" x2="176" y2="172" stroke="#00BCD4" stroke-width="1"/>
  <line x1="322" y1="168" x2="322" y2="172" stroke="#00BCD4" stroke-width="1"/>
  <line x1="460" y1="168" x2="460" y2="172" stroke="#00BCD4" stroke-width="1"/>
  <!-- Item 1: grid-column: 1 / 3 -->
  <rect x="40" y="45" width="126" height="40" fill="#00BCD4" rx="4"/>
  <text x="103" y="69" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">grid-column: 1 / 3</text>
  <!-- Item 2: grid-column: 3 / 4 -->
  <rect x="186" y="45" width="126" height="40" fill="#26C6DA" rx="4"/>
  <text x="249" y="69" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">3 / 4</text>
  <!-- Item 3: grid-column: 1 / -1 -->
  <rect x="40" y="95" width="420" height="50" fill="#FF9100" rx="4"/>
  <text x="250" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">grid-column: 1 / -1 (ancho completo)</text>
</svg>
