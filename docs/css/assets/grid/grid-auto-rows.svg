<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <rect width="500" height="180" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">grid-auto-rows: 150px (todas las filas iguales)</text>
  <rect x="30" y="35" width="440" height="125" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <!-- Línea de grid -->
  <line x1="176" y1="35" x2="176" y2="160" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <line x1="322" y1="35" x2="322" y2="160" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <line x1="30" y1="95" x2="470" y2="95" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>

  <!-- Fila 1 -->
  <rect x="40" y="45" width="126" height="40" fill="#00BCD4" rx="4"/>
  <text x="103" y="69" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">item</text>
  <rect x="186" y="45" width="126" height="40" fill="#26C6DA" rx="4"/>
  <rect x="322" y="45" width="126" height="40" fill="#4DD0E1" rx="4"/>

  <!-- Fila 2 -->
  <rect x="40" y="105" width="126" height="40" fill="#80DEEA" rx="4"/>
  <text x="103" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">misma altura</text>
  <rect x="186" y="105" width="126" height="40" fill="#B2EBF2" rx="4"/>
  <text x="249" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00838f" font-weight="bold">auto</text>
  <rect x="322" y="105" width="126" height="40" fill="#E0F7FA" rx="4"/>
  <text x="385" y="129" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#00838f">150px</text>
</svg>
