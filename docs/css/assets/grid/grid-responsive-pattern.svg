<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <rect width="500" height="300" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">repeat(auto-fit, minmax(200px, 1fr))</text>

  <!-- Desktop 4 columnas -->
  <rect x="30" y="35" width="440" height="75" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <text x="250" y="50" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">Desktop (1200px) → 4 columnas</text>
  <rect x="40" y="58" width="92" height="42" fill="#00BCD4" rx="4"/>
  <text x="86" y="83" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">1</text>
  <rect x="142" y="58" width="92" height="42" fill="#26C6DA" rx="4"/>
  <rect x="244" y="58" width="92" height="42" fill="#4DD0E1" rx="4"/>
  <rect x="346" y="58" width="92" height="42" fill="#80DEEA" rx="4"/>

  <!-- Tablet 2 columnas -->
  <rect x="30" y="125" width="440" height="75" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <text x="250" y="140" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">Tablet (768px) → 2 columnas</text>
  <rect x="40" y="148" width="200" height="42" fill="#00BCD4" rx="4"/>
  <text x="140" y="173" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">1</text>
  <rect x="260" y="148" width="200" height="42" fill="#26C6DA" rx="4"/>

  <!-- Mobile 1 columna -->
  <rect x="30" y="215" width="440" height="65" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <text x="250" y="230" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#999">Mobile (320px) → 1 columna</text>
  <rect x="40" y="238" width="420" height="35" fill="#00BCD4" rx="4"/>
  <text x="250" y="260" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">1</text>

  <!-- Flechas -->
  <line x1="250" y1="113" x2="250" y2="122" stroke="#999" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="250" y1="203" x2="250" y2="212" stroke="#999" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <defs>
    <marker id="arrow-gray" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#999"/>
    </marker>
  </defs>
</svg>
