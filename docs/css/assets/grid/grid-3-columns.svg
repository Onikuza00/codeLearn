<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <rect width="500" height="160" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">grid-template-columns: repeat(3, 1fr)</text>
  <rect x="30" y="35" width="440" height="100" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>
  <!-- Líneas verticales de grid -->
  <line x1="176" y1="35" x2="176" y2="135" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <line x1="322" y1="35" x2="322" y2="135" stroke="#00BCD4" stroke-width="1" stroke-dasharray="3"/>
  <!-- Columnas -->
  <rect x="40" y="45" width="126" height="30" fill="#00BCD4" rx="4"/>
  <text x="103" y="64" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">1fr</text>
  <rect x="186" y="45" width="126" height="30" fill="#26C6DA" rx="4"/>
  <text x="249" y="64" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">1fr</text>
  <rect x="332" y="45" width="126" height="30" fill="#4DD0E1" rx="4"/>
  <text x="395" y="64" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" font-weight="bold">1fr</text>

  <!-- Items dentro de cada columna -->
  <rect x="50" y="88" width="106" height="36" fill="#B2EBF2" rx="4"/>
  <text x="103" y="111" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00838f" font-weight="bold">Item 1</text>
  <rect x="196" y="88" width="106" height="36" fill="#80DEEA" rx="4"/>
  <text x="249" y="111" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00838f" font-weight="bold">Item 2</text>
  <rect x="342" y="88" width="106" height="36" fill="#4DD0E1" rx="4"/>
  <text x="395" y="111" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00838f" font-weight="bold">Item 3</text>
</svg>
