<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" width="500" height="300">
  <rect width="500" height="300" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">grid-template-areas</text>

  <rect x="30" y="35" width="440" height="240" fill="none" stroke="#aaa" stroke-width="1.5" rx="6"/>

  <!-- Header - ancho completo -->
  <rect x="40" y="45" width="420" height="45" fill="#00BCD4" rx="4"/>
  <text x="250" y="72" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">header</text>

  <!-- Sidebar -->
  <rect x="40" y="100" width="130" height="110" fill="#26C6DA" rx="4"/>
  <text x="105" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">sidebar</text>

  <!-- Main -->
  <rect x="180" y="100" width="280" height="110" fill="#4DD0E1" rx="4"/>
  <text x="320" y="158" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">main</text>

  <!-- Footer - ancho completo -->
  <rect x="40" y="220" width="420" height="45" fill="#80DEEA" rx="4"/>
  <text x="250" y="247" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">footer</text>

  <!-- Código CSS -->
  <text x="250" y="290" text-anchor="middle" font-family="monospace" font-size="9" fill="#666">"header  header"  "sidebar  main"  "footer  footer"</text>
</svg>
