<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <rect width="500" height="120" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">justify-content: center</text>
  <rect x="30" y="30" width="440" height="60" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4" rx="6"/>
  <!-- calculado: (500 - (70*3 + 20*2)) / 2 = (500 - 250) / 2 = 125 -->
  <rect x="125" y="42" width="70" height="36" fill="#FF6D00" rx="4"/>
  <text x="160" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">1</text>
  <rect x="205" y="42" width="70" height="36" fill="#FF9100" rx="4"/>
  <text x="240" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">2</text>
  <rect x="285" y="42" width="70" height="36" fill="#FFB74D" rx="4"/>
  <text x="320" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">3</text>
</svg>
