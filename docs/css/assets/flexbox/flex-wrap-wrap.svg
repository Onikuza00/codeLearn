<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 160" width="500" height="160">
  <rect width="500" height="160" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">flex-wrap: wrap (salan a siguiente línea)</text>

  <rect x="30" y="30" width="440" height="110" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4" rx="6"/>

  <!-- Fila 1 -->
  <rect x="40" y="40" width="100" height="40" fill="#FF6D00" rx="4"/>
  <text x="90" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">1</text>

  <rect x="150" y="40" width="100" height="40" fill="#FF9100" rx="4"/>
  <text x="200" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">2</text>

  <rect x="260" y="40" width="100" height="40" fill="#FFB74D" rx="4"/>
  <text x="310" y="65" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">3</text>

  <!-- Fila 2 - wrap -->
  <rect x="40" y="90" width="100" height="40" fill="#FFCC80" rx="4"/>
  <text x="90" y="115" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">4</text>

  <rect x="150" y="90" width="100" height="40" fill="#FFE0B2" rx="4"/>
  <text x="200" y="115" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">5</text>
</svg>
