<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150" width="500" height="150">
  <rect width="500" height="150" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">align-items: baseline (línea base del texto)</text>
  <rect x="30" y="35" width="440" height="85" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4" rx="6"/>
  <!-- Línea base punteada -->
  <line x1="40" y1="85" x2="460" y2="85" stroke="#e040fb" stroke-width="1.5" stroke-dasharray="2"/>
  <text x="460" y="88" text-anchor="end" font-family="sans-serif" font-size="9" fill="#e040fb">baseline</text>
  <rect x="60" y="55" width="80" height="55" fill="#FF6D00" rx="4"/>
  <text x="100" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">Texto</text>
  <rect x="180" y="45" width="80" height="65" fill="#FF9100" rx="4"/>
  <text x="220" y="88" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Texto</text>
  <rect x="300" y="50" width="80" height="60" fill="#FFB74D" rx="4"/>
  <text x="340" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff" font-weight="bold">Texto</text>
</svg>
