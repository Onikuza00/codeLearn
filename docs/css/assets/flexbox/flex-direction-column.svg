<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 380" width="200" height="380">
  <rect width="200" height="380" fill="#fafafa" rx="8"/>
  <text x="100" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">flex-direction: column</text>

  <!-- Contenedor -->
  <rect x="30" y="30" width="140" height="320" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4" rx="6"/>

  <!-- Flecha -->
  <line x1="20" y1="40" x2="20" y2="340" stroke="#FF6D00" stroke-width="2" marker-end="url(#arrow-down)"/>
  <defs>
    <marker id="arrow-down" markerWidth="8" markerHeight="10" refX="4" refY="9" orient="auto">
      <path d="M0,0 L4,10 L8,0" fill="#FF6D00"/>
    </marker>
  </defs>

  <!-- Items -->
  <rect x="55" y="45" width="90" height="40" fill="#FF6D00" rx="4"/>
  <text x="100" y="70" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">1</text>

  <rect x="55" y="100" width="90" height="40" fill="#FF9100" rx="4"/>
  <text x="100" y="125" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">2</text>

  <rect x="55" y="155" width="90" height="40" fill="#FFB74D" rx="4"/>
  <text x="100" y="180" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">3</text>

  <text x="20" y="310" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#FF6D00" transform="rotate(-90, 20, 310)">Eje principal ↓</text>
</svg>
