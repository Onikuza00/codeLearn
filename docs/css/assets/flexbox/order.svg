<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180" width="500" height="180">
  <rect width="500" height="180" fill="#fafafa" rx="8"/>
  <text x="250" y="20" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">order: reorden visual sin cambiar HTML</text>

  <text x="60" y="45" font-family="sans-serif" font-size="10" fill="#999">HTML: [A] [B] [C]</text>
  <text x="340" y="45" font-family="sans-serif" font-size="10" fill="#999">CSS:  A{order:3} B{order:1} C{order:2}</text>

  <rect x="30" y="55" width="440" height="60" fill="none" stroke="#aaa" stroke-width="1.5" stroke-dasharray="4" rx="6"/>

  <!-- Visual order: B (order:1), C (order:2), A (order:3) -->
  <rect x="60" y="67" width="80" height="36" fill="#FF9100" rx="4"/>
  <text x="100" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">B (1)</text>

  <rect x="190" y="67" width="80" height="36" fill="#FFB74D" rx="4"/>
  <text x="230" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">C (2)</text>

  <rect x="320" y="67" width="80" height="36" fill="#FF6D00" rx="4"/>
  <text x="360" y="90" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#fff" font-weight="bold">A (3)</text>

  <text x="250" y="130" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999">Visual: B → C → A (ordenado por valor de order)</text>

  <rect x="110" y="143" width="70" height="22" fill="#4CAF50" rx="4"/>
  <text x="145" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">✅ Visual</text>

  <rect x="250" y="143" width="70" height="22" fill="#f44336" rx="4"/>
  <text x="285" y="158" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fff" font-weight="bold">❌ DOM</text>
</svg>
